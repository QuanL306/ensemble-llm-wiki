version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - API_KEY_SALT=${API_KEY_SALT}
      - MCP_SERVER_URL=http://mcp-server:8001
      - RATE_LIMIT_DEFAULT=${RATE_LIMIT_DEFAULT:-100}
      - QUOTA_DEFAULT=${QUOTA_DEFAULT:-10000}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mcp-server:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.mcp
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - KB_BASE_PATH=/data/knowledge-bases
    volumes:
      - kb_data:/data/knowledge-bases
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
  kb_data:
